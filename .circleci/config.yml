# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

jobs:
  build_mame_windows:
    machine:
      image: windows-server-2022-gui:current
      resource_class: windows.large

    steps:
      - checkout

      - run:
          name: Install MSYS2
          shell: powershell.exe
          command: |
            choco install msys2 -y

      - run:
          name: Verify MSYS2 installation
          shell: powershell.exe
          command: |
            if (Test-Path "C:\tools\msys64\usr\bin\bash.exe") {
              Write-Host "MSYS2 trovato in C:\tools\msys64"
            }
            elseif (Test-Path "C:\msys64\usr\bin\bash.exe") {
              Write-Host "MSYS2 trovato in C:\msys64"
            }
            else {
              Write-Error "MSYS2 non trovato"
              exit 1
            }

      - run:
          name: Install MAME dependencies
          shell: powershell.exe
          command: |
            $bash = "C:\tools\msys64\usr\bin\bash.exe"

            if (!(Test-Path $bash)) {
              $bash = "C:\msys64\usr\bin\bash.exe"
            }

            & $bash -lc "
              pacman --noconfirm -Sy
              pacman --noconfirm -S --needed \
                git \
                make \
                mingw-w64-ucrt-x86_64-gcc \
                mingw-w64-ucrt-x86_64-python \
                mingw-w64-ucrt-x86_64-SDL2 \
                mingw-w64-ucrt-x86_64-SDL2_ttf \
                mingw-w64-ucrt-x86_64-qt6-base
            "

      - run:
          name: Build MAME
          shell: powershell.exe
          command: |
            $bash = "C:\tools\msys64\usr\bin\bash.exe"

            if (!(Test-Path $bash)) {
              $bash = "C:\msys64\usr\bin\bash.exe"
            }

            & $bash -lc "
              export PATH=/ucrt64/bin:/usr/bin:`$PATH
              make -j`$(nproc)
            "

      - store_artifacts:
          path: mame.exe


workflows:
  build_mame:
    jobs:
      - build_mame_windows
      
